name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build PHTV
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.set_versions.outputs.build_number }}
      dmg_name: ${{ steps.dmg.outputs.name }}
      dmg_size: ${{ steps.dmg.outputs.size }}
      zip_name: ${{ steps.zip.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using Xcode at $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Compute build number
        id: set_versions
        run: |
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ BUILD_NUMBER=$BUILD_NUMBER"

      - name: Import Code Signing Certificate
        id: certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "❌ Error: CERTIFICATES_P12 secret is missing."
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security

          echo "$CERTIFICATES_P12" > "$RUNNER_TEMP/cert_base64.txt"
          python3 -c "import base64; open('$RUNNER_TEMP/certificate.p12', 'wb').write(base64.b64decode(open('$RUNNER_TEMP/cert_base64.txt', 'r').read()))"

          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ Error: No valid signing identity found."
            security find-identity -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "🔐 Identity found: $IDENTITY"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: App
        run: |
          echo "🔐 Building with mandatory code signing..."
          echo "Identity: ${{ steps.certificate.outputs.identity }}"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.set_versions.outputs.build_number }}"

          xcodebuild -project PHTV.xcodeproj -scheme PHTV \
            -configuration Release \
            -derivedDataPath ./build \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.certificate.outputs.identity }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ steps.certificate.outputs.keychain }}" \
            DEVELOPMENT_TEAM="" \
            STRIP_SWIFT_SYMBOLS=NO \
            COPY_PHASE_STRIP=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            clean build \
            2>&1 | tee build.log

          if [ ! -d "./build/Build/Products/Release/PHTV.app" ]; then
            echo "❌ Build failed: PHTV.app not found"
            exit 1
          fi

          echo "🔍 Verifying code signature..."
          codesign -dv --verbose=2 "./build/Build/Products/Release/PHTV.app" 2>&1
          codesign --verify --deep --strict "./build/Build/Products/Release/PHTV.app" 2>&1

      - name: Verify Sparkle metadata in app bundle
        working-directory: App
        run: |
          APP_INFO="./build/Build/Products/Release/PHTV.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_INFO"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_INFO"
          /usr/libexec/PlistBuddy -c "Print :SUFeedURL" "$APP_INFO"
          /usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" "$APP_INFO"
          echo "✅ Sparkle metadata exists in app Info.plist"

      - name: Create DMG
        id: dmg
        working-directory: App
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/PHTV.app"
          DMG_NAME="PHTV-$VERSION.dmg"

          xattr -cr "$APP_PATH"

          TEMP_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$TEMP_DIR/"
          ln -s /Applications "$TEMP_DIR/Applications"

          hdiutil create -volname "PHTV" \
            -srcfolder "$TEMP_DIR" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG_NAME"

          rm -rf "$TEMP_DIR"

          SIZE=$(stat -f%z "$DMG_NAME")
          echo "name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "✅ DMG created: $DMG_NAME ($SIZE bytes)"

      - name: Create ZIP
        id: zip
        working-directory: App
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/PHTV.app"
          ZIP_NAME="PHTV-$VERSION.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ ZIP created: $ZIP_NAME"

      - name: Generate Sparkle appcast
        working-directory: App
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "❌ Error: SPARKLE_PRIVATE_KEY secret is missing."
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.zip.outputs.name }}"
          ARCHIVES_DIR="$RUNNER_TEMP/sparkle_archives"
          mkdir -p "$ARCHIVES_DIR"
          cp "$ZIP_NAME" "$ARCHIVES_DIR/"
          if git show origin/main:docs/appcast.xml > "$ARCHIVES_DIR/appcast.xml" 2>/dev/null; then
            echo "✅ Using latest docs/appcast.xml from origin/main"
          else
            cp ../docs/appcast.xml "$ARCHIVES_DIR/appcast.xml"
            echo "⚠️ Falling back to docs/appcast.xml from current checkout"
          fi

          GENERATE_APPCAST="./build/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          if [ ! -x "$GENERATE_APPCAST" ]; then
            echo "❌ Error: generate_appcast binary not found at $GENERATE_APPCAST"
            exit 1
          fi

          DOWNLOAD_PREFIX="https://github.com/${{ github.repository }}/releases/download/v$VERSION/"
          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --maximum-versions 0 \
            "$ARCHIVES_DIR"

          cp "$ARCHIVES_DIR/appcast.xml" ../docs/appcast.xml

          if ! grep -q "sparkle:edSignature" ../docs/appcast.xml; then
            echo "❌ Error: docs/appcast.xml has no sparkle:edSignature"
            exit 1
          fi
          echo "✅ docs/appcast.xml generated and signed"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: App/${{ steps.dmg.outputs.name }}
          retention-days: 1

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip
          path: App/${{ steps.zip.outputs.name }}
          retention-days: 1

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: docs/appcast.xml
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: App/build.log
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: zip

      - name: Generate checksums
        run: |
          sha256sum "${{ needs.build.outputs.dmg_name }}" > checksums.txt
          sha256sum "${{ needs.build.outputs.zip_name }}" >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: PHTV ${{ needs.build.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            ${{ needs.build.outputs.dmg_name }}
            ${{ needs.build.outputs.zip_name }}
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_appcast:
    name: Publish Appcast
    runs-on: ubuntu-latest
    needs:
      - build
      - release

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download appcast artifact
        uses: actions/download-artifact@v4
        with:
          name: appcast
          path: /tmp/phtv-appcast

      - name: Commit and push appcast.xml
        run: |
          cp /tmp/phtv-appcast/appcast.xml docs/appcast.xml

          if git diff --quiet -- docs/appcast.xml; then
            echo "No docs/appcast.xml changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "chore: update appcast for v${{ needs.build.outputs.version }} [skip ci]"
          git push origin main

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs:
      - build
      - release
      - publish_appcast

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Update tap formula
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          DMG_NAME: ${{ needs.build.outputs.dmg_name }}
          DMG_SIZE: ${{ needs.build.outputs.dmg_size }}
        run: |
          set -euo pipefail

          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "❌ Error: TAP_REPO_TOKEN secret is missing."
            exit 1
          fi

          if [ ! -f "$DMG_NAME" ]; then
            echo "❌ Error: DMG artifact not found: $DMG_NAME"
            ls -la
            exit 1
          fi

          ACTUAL_SIZE=$(stat -c%s "$DMG_NAME")
          if [ "$ACTUAL_SIZE" != "$DMG_SIZE" ]; then
            echo "❌ Error: DMG size mismatch (expected=$DMG_SIZE, actual=$ACTUAL_SIZE)"
            exit 1
          fi

          SHA256=$(sha256sum "$DMG_NAME" | cut -d' ' -f1)
          echo "✅ SHA256: $SHA256"

          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/PhamHungTien/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          SHA256="$SHA256" VERSION="$VERSION" python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          cask_path = Path("Casks/phtv.rb")
          if not cask_path.exists():
              print("❌ Error: Casks/phtv.rb not found", file=sys.stderr)
              sys.exit(1)

          text = cask_path.read_text(encoding="utf-8")
          text, n_version = re.subn(
              r'(?m)^(\s*)version\s+"[^"]+"\s*$',
              rf'\1version "{os.environ["VERSION"]}"',
              text,
              count=1
          )
          text, n_sha = re.subn(
              r'(?m)^(\s*)sha256\s+"[^"]+"\s*$',
              rf'\1sha256 "{os.environ["SHA256"]}"',
              text,
              count=1
          )

          if n_version != 1 or n_sha != 1:
              print("❌ Error: Unable to update version/sha256 in Casks/phtv.rb", file=sys.stderr)
              sys.exit(1)

          cask_path.write_text(text, encoding="utf-8")
          print("✅ Updated Casks/phtv.rb")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Casks/phtv.rb
          if git diff --staged --quiet; then
            echo "No changes to tap"
            exit 0
          fi

          git commit -m "chore: update phtv to v$VERSION"
          git push origin main
          echo "✅ Tap synced"

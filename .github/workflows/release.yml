name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.4.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  SPARKLE_VERSION: "2.8.1"

jobs:
  build:
    name: Build PHTV
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.set_versions.outputs.build_number }}
      dmg_name: ${{ steps.dmg.outputs.name }}
      dmg_size: ${{ steps.dmg.outputs.size }}
      zip_name: ${{ steps.zip.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using Xcode at $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected SemVer, e.g. 1.4.0 or 1.4.0-beta.1"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

      - name: Compute build number
        id: set_versions
        run: |
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ BUILD_NUMBER=$BUILD_NUMBER"

      - name: Update Info.plist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.set_versions.outputs.build_number }}"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" App/PHTV/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" App/PHTV/Info.plist

          echo "✅ Updated Info.plist: $VERSION ($BUILD)"

      - name: Import Code Signing Certificate
        id: certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          fallback_to_adhoc() {
            echo "⚠️ Falling back to ad-hoc signing (internal mode)."
            echo "identity=-" >> "$GITHUB_OUTPUT"
            echo "keychain=" >> "$GITHUB_OUTPUT"
            echo "identity_type=adhoc" >> "$GITHUB_OUTPUT"
            exit 0
          }

          if [ -z "${CERTIFICATES_P12:-}" ] || [ -z "${CERTIFICATE_PASSWORD:-}" ]; then
            echo "⚠️ CERTIFICATES_P12 or CERTIFICATE_PASSWORD secret is missing."
            fallback_to_adhoc
          fi

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Apple WWDR Intermediate Certificate (best effort)
          if curl -fsSL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"; then
            security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security || true
          fi

          # Decode P12 from base64
          if ! printf '%s' "$CERTIFICATES_P12" | tr -d '\n' | openssl base64 -d -A -out "$RUNNER_TEMP/certificate.p12"; then
            echo "⚠️ Failed to decode CERTIFICATES_P12."
            fallback_to_adhoc
          fi
          if [ ! -s "$RUNNER_TEMP/certificate.p12" ]; then
            echo "⚠️ Decoded certificate.p12 is empty."
            fallback_to_adhoc
          fi

          # Import P12
          if ! security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A; then
            echo "⚠️ Failed to import certificate.p12."
            fallback_to_adhoc
          fi

          # Add keychain to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          DEV_ID_CANDIDATES="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application:/ { print $2 }'
          )"
          validate_identity() {
            local identity="$1"
            local probe_bin="$RUNNER_TEMP/codesign_probe.bin"
            cp /usr/bin/true "$probe_bin"
            if ! codesign --force --sign "$identity" --keychain "$KEYCHAIN_PATH" --timestamp=none "$probe_bin" >/dev/null 2>&1; then
              rm -f "$probe_bin"
              return 1
            fi
            if ! codesign --verify --verbose=2 "$probe_bin" >/dev/null 2>&1; then
              rm -f "$probe_bin"
              return 1
            fi
            rm -f "$probe_bin"
            return 0
          }

          IDENTITY=""
          IDENTITY_TYPE=""

          while IFS= read -r candidate; do
            [ -z "$candidate" ] && continue
            if validate_identity "$candidate"; then
              IDENTITY="$candidate"
              IDENTITY_TYPE="developer_id"
              break
            fi
            echo "⚠️ Skipping unusable identity: $candidate"
          done < <(printf '%s\n' "$DEV_ID_CANDIDATES")

          if [ -z "$IDENTITY" ]; then
            echo "⚠️ No usable Developer ID identity after validation."
            fallback_to_adhoc
          fi

          echo "🔐 Identity selected: $IDENTITY"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "identity_type=$IDENTITY_TYPE" >> "$GITHUB_OUTPUT"

      - name: Configure Distribution Mode
        id: distribution
        env:
          APPLE_NOTARY_API_KEY: ${{ secrets.APPLE_NOTARY_API_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail

          MODE="internal"
          NOTARY_ENABLED="false"
          API_KEY_PATH=""
          API_KEY_ID=""
          ISSUER_ID=""

          if [ "${{ steps.certificate.outputs.identity_type }}" = "developer_id" ]; then
            MODE="public"
            if [ -n "$APPLE_NOTARY_API_KEY" ] && [ -n "$APPLE_NOTARY_KEY_ID" ] && [ -n "$APPLE_NOTARY_ISSUER_ID" ]; then
              API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
              python3 -c 'import os,sys; key=os.environ["APPLE_NOTARY_API_KEY"]; key=key.replace("\\n","\n") if "\\n" in key and "\n" not in key else key; sys.stdout.write(key)' > "$API_KEY_PATH"
              chmod 600 "$API_KEY_PATH"

              API_KEY_ID="$APPLE_NOTARY_KEY_ID"
              ISSUER_ID="$APPLE_NOTARY_ISSUER_ID"
              NOTARY_ENABLED="true"
              echo "✅ Public mode enabled (Developer ID + notarization)"
            else
              MODE="internal"
              echo "⚠️ Developer ID detected but notarization secrets are missing."
              echo "⚠️ Falling back to internal mode (not notarized)."
            fi
          else
            echo "ℹ️ Internal mode enabled (ad-hoc signing, no notarization)."
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "notary_enabled=$NOTARY_ENABLED" >> "$GITHUB_OUTPUT"
          echo "api_key_path=$API_KEY_PATH" >> "$GITHUB_OUTPUT"
          echo "api_key_id=$API_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "issuer_id=$ISSUER_ID" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: App
        run: |
          set -euo pipefail
          set -o pipefail
          SIGNING_IDENTITY="${{ steps.certificate.outputs.identity }}"
          SIGNING_KEYCHAIN="${{ steps.certificate.outputs.keychain }}"

          if [ "$SIGNING_IDENTITY" = "-" ]; then
            echo "🔐 Building with ad-hoc signing (internal mode)"
          else
            echo "🔐 Building with certificate signing"
            echo "Identity: $SIGNING_IDENTITY"
          fi

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ steps.set_versions.outputs.build_number }}"
          APP_PATH="./build/Build/Products/Release/PHTV.app"
          VERIFY_SCRIPT="../scripts/release/verify_app_bundle_signature.sh"

          if [ -n "$SIGNING_KEYCHAIN" ]; then
            xcodebuild -project PHTV.xcodeproj -scheme PHTV \
              -configuration Release \
              -derivedDataPath ./build \
              -arch arm64 -arch x86_64 \
              MARKETING_VERSION="$VERSION" \
              CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              OTHER_CODE_SIGN_FLAGS="--keychain $SIGNING_KEYCHAIN" \
              DEVELOPMENT_TEAM="" \
              STRIP_SWIFT_SYMBOLS=NO \
              COPY_PHASE_STRIP=NO \
              STRIP_INSTALLED_PRODUCT=NO \
              COMPILER_INDEX_STORE_ENABLE=NO \
              clean build \
              2>&1 | tee build.log
          else
            xcodebuild -project PHTV.xcodeproj -scheme PHTV \
              -configuration Release \
              -derivedDataPath ./build \
              -arch arm64 -arch x86_64 \
              MARKETING_VERSION="$VERSION" \
              CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              DEVELOPMENT_TEAM="" \
              STRIP_SWIFT_SYMBOLS=NO \
              COPY_PHASE_STRIP=NO \
              STRIP_INSTALLED_PRODUCT=NO \
              COMPILER_INDEX_STORE_ENABLE=NO \
              clean build \
              2>&1 | tee build.log
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Build failed: PHTV.app not found"
            exit 1
          fi

          # Verify universal binary
          echo "🔍 Verifying binary architectures..."
          file "$APP_PATH/Contents/MacOS/PHTV"

          # Verify app bundle integrity and signature before packaging
          bash "$VERIFY_SCRIPT" "$APP_PATH" "Built app"

      - name: Notarize and staple app bundle
        if: steps.distribution.outputs.notary_enabled == 'true'
        working-directory: App
        run: |
          set -euo pipefail

          APP_PATH="./build/Build/Products/Release/PHTV.app"
          NOTARY_ZIP="$RUNNER_TEMP/PHTV-notary.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$NOTARY_ZIP"

          bash ../scripts/release/notarize_artifact.sh \
            "$NOTARY_ZIP" \
            "PHTV app bundle" \
            "${{ steps.distribution.outputs.api_key_path }}" \
            "${{ steps.distribution.outputs.api_key_id }}" \
            "${{ steps.distribution.outputs.issuer_id }}" \
            "$APP_PATH"

      - name: Create DMG
        id: dmg
        working-directory: App
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/PHTV.app"
          DMG_NAME="PHTV-$VERSION.dmg"

          # Remove extended attributes (quarantine) to prevent "damaged" error
          xattr -cr "$APP_PATH"
          echo "✅ Removed extended attributes from app"

          TEMP_DIR=$(mktemp -d)
          ditto "$APP_PATH" "$TEMP_DIR/PHTV.app"
          ln -s /Applications "$TEMP_DIR/Applications"

          hdiutil create -volname "PHTV" \
            -srcfolder "$TEMP_DIR" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "$DMG_NAME"

          rm -rf "$TEMP_DIR"

          SIZE=$(stat -f%z "$DMG_NAME")
          echo "name=$DMG_NAME" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ DMG created: $DMG_NAME ($SIZE bytes)"

      - name: Create ZIP
        id: zip
        working-directory: App
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="./build/Build/Products/Release/PHTV.app"
          ZIP_NAME="PHTV-$VERSION.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ ZIP created: $ZIP_NAME"

      - name: Notarize and staple DMG
        if: steps.distribution.outputs.notary_enabled == 'true'
        working-directory: App
        run: |
          set -euo pipefail

          DMG_NAME="${{ steps.dmg.outputs.name }}"

          bash ../scripts/release/notarize_artifact.sh \
            "$DMG_NAME" \
            "PHTV release DMG" \
            "${{ steps.distribution.outputs.api_key_path }}" \
            "${{ steps.distribution.outputs.api_key_id }}" \
            "${{ steps.distribution.outputs.issuer_id }}" \
            "$DMG_NAME"

      - name: Validate packaged artifacts
        working-directory: App
        run: |
          set -euo pipefail
          if [ "${{ steps.distribution.outputs.notary_enabled }}" = "true" ]; then
            export REQUIRE_NOTARIZED_TICKET=1
          else
            export REQUIRE_NOTARIZED_TICKET=0
            echo "⚠️ Notarization validation is disabled in internal mode."
          fi
          VERIFY_SCRIPT="../scripts/release/verify_app_bundle_signature.sh"
          DMG_NAME="${{ steps.dmg.outputs.name }}"
          ZIP_NAME="${{ steps.zip.outputs.name }}"

          if [ ! -f "$DMG_NAME" ]; then
            echo "❌ DMG not found: $DMG_NAME"
            exit 1
          fi

          if [ ! -f "$ZIP_NAME" ]; then
            echo "❌ ZIP not found: $ZIP_NAME"
            exit 1
          fi

          if [ "${{ steps.distribution.outputs.notary_enabled }}" = "true" ]; then
            xcrun stapler validate -v "$DMG_NAME"
          fi

          TMP_DIR=$(mktemp -d)
          ZIP_EXTRACT_DIR="$TMP_DIR/zip"
          MOUNT_POINT="$TMP_DIR/mount"
          mkdir -p "$ZIP_EXTRACT_DIR" "$MOUNT_POINT"

          cleanup() {
            if mount | grep -q "on $MOUNT_POINT "; then
              hdiutil detach "$MOUNT_POINT" -quiet || true
            fi
            rm -rf "$TMP_DIR"
          }
          trap cleanup EXIT

          # Validate ZIP payload
          ditto -x -k "$ZIP_NAME" "$ZIP_EXTRACT_DIR"
          ZIP_APP_PATH=$(find "$ZIP_EXTRACT_DIR" -maxdepth 3 -type d -name "PHTV.app" | head -1)
          if [ -z "${ZIP_APP_PATH:-}" ]; then
            echo "❌ ZIP payload does not contain PHTV.app"
            exit 1
          fi
          bash "$VERIFY_SCRIPT" "$ZIP_APP_PATH" "ZIP artifact"

          # Validate DMG payload
          hdiutil attach "$DMG_NAME" -mountpoint "$MOUNT_POINT" -nobrowse -readonly -quiet
          DMG_APP_PATH="$MOUNT_POINT/PHTV.app"
          if [ ! -d "$DMG_APP_PATH" ]; then
            echo "❌ DMG payload does not contain PHTV.app"
            ls -la "$MOUNT_POINT"
            exit 1
          fi
          bash "$VERIFY_SCRIPT" "$DMG_APP_PATH" "DMG artifact"

          echo "✅ Packaged artifacts passed signature and Info.plist validation"

      - name: Download Sparkle
        working-directory: App
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${{ env.SPARKLE_VERSION }}/Sparkle-for-Swift-Package-Manager.zip" -o sparkle.zip
          unzip -q sparkle.zip -d /tmp/Sparkle
          echo "✅ Sparkle downloaded"

      - name: Generate Sparkle appcast
        working-directory: App
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "❌ Error: SPARKLE_PRIVATE_KEY secret is missing."
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.zip.outputs.name }}"
          ARCHIVES_DIR="$RUNNER_TEMP/sparkle_archives"
          export ARCHIVES_DIR
          mkdir -p "$ARCHIVES_DIR"
          cp "$ZIP_NAME" "$ARCHIVES_DIR/"
          if git show origin/main:docs/appcast.xml > "$ARCHIVES_DIR/appcast.xml" 2>/dev/null; then
            echo "✅ Using latest docs/appcast.xml from origin/main"
          else
            cp ../docs/appcast.xml "$ARCHIVES_DIR/appcast.xml"
            echo "⚠️ Falling back to docs/appcast.xml from current checkout"
          fi

          xcrun swift - << 'SWIFT'
          import Foundation
          import Darwin

          func firstCapture(pattern: String, in text: String, options: NSRegularExpression.Options = []) -> String? {
              guard let regex = try? NSRegularExpression(pattern: pattern, options: options) else {
                  return nil
              }
              let range = NSRange(text.startIndex..., in: text)
              guard let match = regex.firstMatch(in: text, options: [], range: range),
                    match.numberOfRanges > 1,
                    let captureRange = Range(match.range(at: 1), in: text) else {
                  return nil
              }
              return String(text[captureRange])
          }

          func normalizeTitle(_ raw: String?) -> String {
              let collapsed = (raw ?? "unknown")
                  .replacingOccurrences(of: "\\s+", with: " ", options: .regularExpression)
                  .trimmingCharacters(in: .whitespacesAndNewlines)
              return collapsed.isEmpty ? "unknown" : collapsed
          }

          func signatureValidationError(_ signature: String?) -> String? {
              guard let raw = signature?.trimmingCharacters(in: .whitespacesAndNewlines), !raw.isEmpty else {
                  return "missing sparkle:edSignature"
              }
              guard let decoded = Data(base64Encoded: raw) else {
                  return "signature is not valid base64"
              }
              return decoded.count == 64 ? nil : "decoded signature length is \(decoded.count), expected 64"
          }

          let env = ProcessInfo.processInfo.environment
          guard let archivesDir = env["ARCHIVES_DIR"] else {
              fputs("❌ Missing ARCHIVES_DIR\n", stderr)
              exit(1)
          }

          let appcastURL = URL(fileURLWithPath: archivesDir).appendingPathComponent("appcast.xml")
          let appcastContent = try String(contentsOf: appcastURL, encoding: .utf8)
          guard appcastContent.contains("<channel>") else {
              fputs("❌ Invalid appcast.xml: missing channel element\n", stderr)
              exit(1)
          }

          let itemRegex = try NSRegularExpression(pattern: "<item\\b[\\s\\S]*?</item>", options: [.caseInsensitive])
          let itemMatches = itemRegex.matches(
              in: appcastContent,
              options: [],
              range: NSRange(appcastContent.startIndex..., in: appcastContent)
          )

          let signaturePattern = "(?:sparkle:edSignature|edSignature)\\s*=\\s*\"([^\"]+)\""
          let titlePattern = "<title>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?</title>"
          let mutableContent = NSMutableString(string: appcastContent)
          var removedTitles: [String] = []

          for match in itemMatches.reversed() {
              guard let itemRange = Range(match.range, in: appcastContent) else {
                  continue
              }

              let itemText = String(appcastContent[itemRange])
              let signature = firstCapture(pattern: signaturePattern, in: itemText, options: [.caseInsensitive])
              if signatureValidationError(signature) != nil {
                  let title = normalizeTitle(
                      firstCapture(pattern: titlePattern, in: itemText, options: [.caseInsensitive])
                  )
                  removedTitles.append(title)
                  mutableContent.deleteCharacters(in: match.range)
              }
          }

          if removedTitles.isEmpty {
              print("✅ Existing appcast signatures are valid")
          } else {
              print("⚠️ Removed \(removedTitles.count) invalid appcast item(s) before generation:")
              for title in removedTitles {
                  print("  - \(title)")
              }
              try (mutableContent as String).write(to: appcastURL, atomically: true, encoding: .utf8)
          }
          SWIFT

          GENERATE_APPCAST="/tmp/Sparkle/bin/generate_appcast"
          if [ ! -x "$GENERATE_APPCAST" ]; then
            echo "❌ Error: generate_appcast binary not found at $GENERATE_APPCAST"
            exit 1
          fi

          DOWNLOAD_PREFIX="https://github.com/${{ github.repository }}/releases/download/v$VERSION/"
          echo "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_PREFIX" \
            --maximum-versions 0 \
            "$ARCHIVES_DIR"

          cp "$ARCHIVES_DIR/appcast.xml" ../docs/appcast.xml

          xcrun swift - << 'SWIFT'
          import Foundation
          import Darwin

          func firstCapture(pattern: String, in text: String, options: NSRegularExpression.Options = []) -> String? {
              guard let regex = try? NSRegularExpression(pattern: pattern, options: options) else {
                  return nil
              }
              let range = NSRange(text.startIndex..., in: text)
              guard let match = regex.firstMatch(in: text, options: [], range: range),
                    match.numberOfRanges > 1,
                    let captureRange = Range(match.range(at: 1), in: text) else {
                  return nil
              }
              return String(text[captureRange])
          }

          func normalizeTitle(_ raw: String?) -> String {
              let collapsed = (raw ?? "unknown")
                  .replacingOccurrences(of: "\\s+", with: " ", options: .regularExpression)
                  .trimmingCharacters(in: .whitespacesAndNewlines)
              return collapsed.isEmpty ? "unknown" : collapsed
          }

          func signatureValidationError(_ signature: String?) -> String? {
              guard let raw = signature?.trimmingCharacters(in: .whitespacesAndNewlines), !raw.isEmpty else {
                  return "missing sparkle:edSignature"
              }
              guard let decoded = Data(base64Encoded: raw) else {
                  return "signature is not valid base64"
              }
              return decoded.count == 64 ? nil : "decoded signature length is \(decoded.count), expected 64"
          }

          let appcastURL = URL(fileURLWithPath: "../docs/appcast.xml")
          let appcastContent = try String(contentsOf: appcastURL, encoding: .utf8)
          let itemRegex = try NSRegularExpression(pattern: "<item\\b[\\s\\S]*?</item>", options: [.caseInsensitive])
          let itemMatches = itemRegex.matches(
              in: appcastContent,
              options: [],
              range: NSRange(appcastContent.startIndex..., in: appcastContent)
          )

          if itemMatches.isEmpty {
              fputs("❌ Error: docs/appcast.xml has no <item> entries\n", stderr)
              exit(1)
          }

          let signaturePattern = "(?:sparkle:edSignature|edSignature)\\s*=\\s*\"([^\"]+)\""
          let titlePattern = "<title>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?</title>"
          var invalid: [(title: String, reason: String)] = []

          for match in itemMatches {
              guard let itemRange = Range(match.range, in: appcastContent) else {
                  continue
              }

              let itemText = String(appcastContent[itemRange])
              let title = normalizeTitle(firstCapture(pattern: titlePattern, in: itemText, options: [.caseInsensitive]))
              let signature = firstCapture(pattern: signaturePattern, in: itemText, options: [.caseInsensitive])
              if let reason = signatureValidationError(signature) {
                  invalid.append((title, reason))
              }
          }

          if !invalid.isEmpty {
              print("❌ Error: invalid Sparkle signatures found in docs/appcast.xml")
              for entry in invalid {
                  print("  - \(entry.title): \(entry.reason)")
              }
              exit(1)
          }

          print("✅ docs/appcast.xml generated and signed (\(itemMatches.count) items validated)")
          SWIFT

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: App/${{ steps.dmg.outputs.name }}
          retention-days: 1

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zip
          path: App/${{ steps.zip.outputs.name }}
          retention-days: 1

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: docs/appcast.xml
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: App/build.log
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Download ZIP
        uses: actions/download-artifact@v4
        with:
          name: zip

      - name: Generate checksums
        run: |
          sha256sum "${{ needs.build.outputs.dmg_name }}" > checksums.txt
          sha256sum "${{ needs.build.outputs.zip_name }}" >> checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: PHTV ${{ needs.build.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          files: |
            ${{ needs.build.outputs.dmg_name }}
            ${{ needs.build.outputs.zip_name }}
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-appcast:
    name: Publish Appcast
    runs-on: ubuntu-latest
    needs: [build, release]
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download appcast artifact
        uses: actions/download-artifact@v4
        with:
          name: appcast
          path: /tmp/phtv-appcast

      - name: Commit and push appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main
          cp /tmp/phtv-appcast/appcast.xml docs/appcast.xml

          if git diff --quiet -- docs/appcast.xml; then
            echo "No docs/appcast.xml changes to commit."
            exit 0
          fi

          git add docs/appcast.xml
          git commit -m "chore: update appcast for v${{ needs.build.outputs.version }} [skip ci]"
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ Appcast pushed"
              exit 0
            fi
            echo "⚠️ Push failed, retrying with rebase ($attempt/3)..."
            git pull --rebase origin main
          done
          echo "❌ Failed to push appcast after retries"
          exit 1

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [build, release, publish-appcast]
    permissions:
      contents: read

    steps:
      - name: Sync to homebrew-tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          DMG_NAME: ${{ needs.build.outputs.dmg_name }}
          DMG_SIZE: ${{ needs.build.outputs.dmg_size }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "⚠️ TAP_REPO_TOKEN not set, skipping tap sync"
            exit 0
          fi

          # Download DMG and calculate SHA256
          curl -fSL --retry 5 --retry-all-errors --retry-delay 2 \
            "https://github.com/$REPO/releases/download/v$VERSION/$DMG_NAME" \
            -o "$DMG_NAME"
          if [ ! -s "$DMG_NAME" ]; then
            echo "❌ Downloaded DMG is missing or empty"
            exit 1
          fi
          ACTUAL_SIZE=$(stat -c%s "$DMG_NAME")
          if [ "$ACTUAL_SIZE" != "$DMG_SIZE" ]; then
            echo "❌ Downloaded file size mismatch: expected $DMG_SIZE, got $ACTUAL_SIZE"
            exit 1
          fi
          SHA256=$(sha256sum "$DMG_NAME" | cut -d' ' -f1)
          echo "✅ SHA256: $SHA256"

          # Clone and update homebrew-tap
          git clone "https://x-access-token:${TAP_REPO_TOKEN}@github.com/PhamHungTien/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Update version and sha256 in cask
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/phtv.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/phtv.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/phtv.rb

          if git diff --staged --quiet; then
            echo "No changes to tap"
          else
            git commit -m "chore: update PHTV to v$VERSION"
            git push
            echo "✅ Tap synced"
          fi

  update-plist:
    name: Update Info.plist
    runs-on: macos-26
    needs: [build, release, publish-appcast, update-homebrew]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Update Info.plist for next release
        env:
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ needs.build.outputs.build_number }}
        run: |
          # Pull latest changes first
          git pull origin main --rebase

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" App/PHTV/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/PHTV/Info.plist
          echo "✅ Updated Info.plist to $VERSION ($BUILD_NUMBER)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add App/PHTV/Info.plist

          if git diff --cached --quiet; then
            echo "No changes to Info.plist"
          else
            git commit -m "chore: bump version to $VERSION ($BUILD_NUMBER) [skip ci]"
            for attempt in 1 2 3; do
              if git push; then
                echo "✅ Info.plist committed"
                exit 0
              fi
              echo "⚠️ Push failed, retrying with rebase ($attempt/3)..."
              git pull --rebase origin main
            done
            echo "❌ Failed to push Info.plist after retries"
            exit 1
          fi

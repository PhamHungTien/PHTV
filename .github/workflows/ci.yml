name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Regression Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Validate repository metadata
        run: |
          set -euo pipefail
          scripts/tools/release_notes.swift self-test
          scripts/tools/repository_policy.swift check
          # A CHANGELOG entry may be prepared before its release exists in the
          # feed. Validate the currently published item instead of blocking
          # normal release preparation.
          VERSION=$(scripts/tools/release_notes.swift appcast-version --appcast docs/appcast.xml)
          INTEL_VERSION=$(scripts/tools/release_notes.swift appcast-version --appcast docs/appcast-intel.xml)
          test "$VERSION" = "$INTEL_VERSION"
          scripts/tools/release_notes.swift check \
            --version "$VERSION" \
            --appcast docs/appcast.xml \
            --appcast docs/appcast-intel.xml
          xmllint --noout docs/appcast.xml docs/appcast-intel.xml docs/appcast-beta.xml
          plutil -lint App/PHTV/Info.plist App/PHTV/PHTV.entitlements App/PHTV/PrivacyInfo.xcprivacy

      - name: Validate dictionary sources
        run: swift scripts/tools/generate_dict_binary.swift --strict-check-sources

      - name: Verify dictionary binaries are current
        run: |
          set -euo pipefail
          swift scripts/tools/generate_dict_binary.swift
          if ! git diff --exit-code -- App/PHTV/Resources/Dictionaries/en_dict.bin App/PHTV/Resources/Dictionaries/vi_dict.bin; then
            echo "❌ Dictionary binaries are stale. Re-run swift scripts/tools/generate_dict_binary.swift and commit the updated .bin files."
            exit 1
          fi

      - name: Build
        working-directory: App
        run: |
          set -o pipefail
          xcodebuild build \
            -project PHTV.xcodeproj \
            -scheme PHTV \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            | tee build.log

      - name: Run full XCTest suite
        run: |
          set -euo pipefail
          DERIVED_DATA_PATH="${DERIVED_DATA_PATH:-$PWD/.build/derived-data}"
          DESTINATION="${PHTV_TEST_DESTINATION:-platform=macOS}"
          RESULT_DIR="$PWD/.build/test-results"
          RESULT_BUNDLE="$RESULT_DIR/PHTV-CI.xcresult"
          DEFAULTS_DOMAIN="com.phamhungtien.phtv"

          pkill -x PHTV >/dev/null 2>&1 || true
          defaults delete "$DEFAULTS_DOMAIN" >/dev/null 2>&1 || true
          mkdir -p "$RESULT_DIR"
          rm -rf "$RESULT_BUNDLE"

          xcodebuild \
            -project App/PHTV.xcodeproj \
            -scheme PHTV \
            -configuration Debug \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -enableCodeCoverage YES \
            -parallel-testing-enabled NO \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            test

          echo "Code coverage summary:"
          xcrun xccov view --report "$RESULT_BUNDLE" || true

          pkill -x PHTV >/dev/null 2>&1 || true
          defaults delete "$DEFAULTS_DOMAIN" >/dev/null 2>&1 || true

      - name: Clean test defaults
        if: always()
        run: |
          pkill -x PHTV >/dev/null 2>&1 || true
          defaults delete com.phamhungtien.phtv >/dev/null 2>&1 || true

      - name: Upload XCTest result bundle
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ci-xcresult
          path: .build/test-results/PHTV-CI.xcresult
          retention-days: 14

      - name: Upload build log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ci-build-log
          path: App/build.log
          retention-days: 7
